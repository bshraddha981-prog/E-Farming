<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Weather Checker</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f6ff;
        }

        .card {
            background: white;
            padding: 20px;
            margin: auto;
            width: 350px;
            margin-top: 50px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
    </style>

</head>

<body>

<div class="card">

    <h2>🌦 Weather Checker</h2>

    <!-- FORM -->
    <form action="/weather" method="post">
        <input type="text" name="city" placeholder="Enter city name" required>
        <br>
        <button type="submit">Check Weather</button>
    </form>

    <!-- RESULT -->
    <div class="result" th:if="${weather}">
        <h3>Weather Result</h3>
        <p th:text="${weather}"></p>
    </div>

    <!-- BACK -->
    <a href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
