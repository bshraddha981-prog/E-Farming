<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center mb-4">✏️ Edit User</h2>

<form action="/updateUser" method="post" class="w-50 mx-auto">

    <input type="hidden" name="id" th:value="${user.id}">

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" th:value="${user.name}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" th:value="${user.email}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" th:value="${user.password}" class="form-control">
    </div>

    <button class="btn btn-primary w-100">Update</button>

</form>

</body>
</html>
