<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Crop</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: orange;
            color: white;
            border: none;
            border-radius: 5px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>✏️ Edit Crop</h2>

    <form action="/updateCrop" method="post">

        <!-- Hidden ID -->
        <input type="hidden" name="id" th:value="${crop.id}">

        Name:
        <input type="text" name="name" th:value="${crop.name}" required>

        Type:
        <input type="text" name="type" th:value="${crop.type}" required>

        <br>
        <button type="submit">Update</button>

    </form>

    <a href="/crops">⬅ Back to Crops</a>

</div>

</body>
</html>
