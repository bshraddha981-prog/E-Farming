<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crop Management</title>
</head>
<body>

<h2>Add Crop</h2>

<form action="/addCrop" method="post">
    <input type="text" name="name" placeholder="Crop Name" required><br><br>
    <input type="text" name="type" placeholder="Crop Type" required><br><br>
    <input type="text" name="season" placeholder="Season" required><br><br>
    <button type="submit">Add Crop</button>
</form>

<hr>

<h2>Crop List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Type</th>
        <th>Season</th>
        <th>Action</th>
    </tr>

    <tr th:each="crop : ${crops}">
        <td th:text="${crop.id}"></td>
        <td th:text="${crop.name}"></td>
        <td th:text="${crop.type}"></td>
        <td th:text="${crop.season}"></td>

        <td>
            <!-- ✏️ Edit -->
            <a th:href="@{'/editCrop/' + ${crop.id}}">Edit</a>

            |

            <!-- ❌ Delete -->
            <a th:href="@{'/deleteCrop/' + ${crop.id}}"
               onclick="return confirm('Are you sure to delete?')">
               Delete
            </a>
        </td>
    </tr>

</table>

<br>
<a href="/">⬅ Back to Dashboard</a>

</body>
</html>
