<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Admin Dashboard</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
        }

        h1{
            text-align:center;
            color:green;
        }

        h2{
            margin-top:40px;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ccc;
            padding:12px;
            text-align:center;
        }

        th{
            background:green;
            color:white;
        }

        a{
            text-decoration:none;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
            padding:8px 14px;
            cursor:pointer;
            border-radius:5px;
        }

        .back-btn{
            background:green;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:5px;
            cursor:pointer;
            margin:5px;
        }

        .top{
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<h1>🌾 Admin Dashboard</h1>

<div class="top">

    <a href="/">

        <button class="back-btn">
            ⬅ Back To Dashboard
        </button>

    </a>

    <a href="/admin/logout">

        <button
            class="back-btn"
            style="background:red;">

            Logout

        </button>

    </a>

</div>

<h2>👨 All Users</h2>

<table>

    <tr>

        <th>ID</th>

        <th>Name</th>

        <th>Email</th>

        <th>Action</th>

    </tr>

    <tr th:each="u : ${users}">

        <td th:text="${u.id}"></td>

        <td th:text="${u.name}"></td>

        <td th:text="${u.email}"></td>

        <td>

            <a th:href="@{/admin/delete-user/{id}(id=${u.id})}">

                <button class="delete-btn">

                    Delete

                </button>

            </a>

        </td>

    </tr>

</table>

<h2>🌱 All Crops</h2>

<table>

    <tr>

        <th>ID</th>

        <th>Crop Name</th>

        <th>Season</th>

        <th>Action</th>

    </tr>

    <tr th:each="c : ${crops}">

        <td th:text="${c.id}"></td>

        <td th:text="${c.name}"></td>

        <td th:text="${c.season}"></td>

        <td>

            <a th:href="@{/admin/delete-crop/{id}(id=${c.id})}">

                <button class="delete-btn">

                    Delete

                </button>

            </a>

        </td>

    </tr>

</table>

</body>
</html>
