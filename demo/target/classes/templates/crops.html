<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crops</title>

    <!-- ⭐ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="text-success">🌾 Crops List</h2>

    <!-- SEARCH -->
    <form action="/crops" method="get" class="d-flex mb-3">
        <input type="text" name="keyword" class="form-control me-2" placeholder="Search crop...">
        <button class="btn btn-primary">Search</button>
    </form>

    <a href="/addCrop" class="btn btn-success mb-3">➕ Add Crop</a>

    <!-- TABLE -->
    <table class="table table-bordered table-striped">
        <tr>
            <th>Name</th>
            <th>Season</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        <tr th:each="c : ${crops}">
            <td th:text="${c.name}"></td>
            <td th:text="${c.season}"></td>
            <td th:text="${c.price}"></td>
            <td>
                <a th:href="@{'/editCrop/' + ${c.id}}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{'/deleteCrop/' + ${c.id}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>>
