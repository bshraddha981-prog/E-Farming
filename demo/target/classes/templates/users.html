<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users List</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #198754;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px #ccc;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background: #198754;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .btn {
            padding: 6px 12px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .add-btn {
            display: block;
            width: 150px;
            margin: 20px auto;
            text-align: center;
            background: #0d6efd;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>

</head>

<body>

<h2>👤 Users List (Database)</h2>

<a class="add-btn" href="/addUser">➕ Add User</a>

<table>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    <!-- Dynamic Data from DB -->
    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
        <td>
            <a class="btn" th:href="@{'/deleteUser/' + ${u.id}}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
