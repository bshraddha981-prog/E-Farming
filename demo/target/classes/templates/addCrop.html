<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Crop</title>

    <!-- ⭐ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="text-secondary">🌾 Add / Edit Crop</h2>

    <form action="/saveCrop" method="post" th:object="${crop}" class="card p-3 shadow">

        <input type="hidden" th:field="*{id}" />

        <label>Name</label>
        <input type="text" th:field="*{name}" class="form-control mb-2" />

        <label>Season</label>
        <input type="text" th:field="*{season}" class="form-control mb-2" />

        <label>Price</label>
        <input type="number" th:field="*{price}" class="form-control mb-2" />

        <button type="submit" class="btn btn-primary">Save</button>

    </form>

</div>

<!-- ⭐ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
